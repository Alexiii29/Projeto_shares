<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📤 Upload de Ficheiros</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 550px;
      width: 100%;
      transition: all 0.3s;
    }
    
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    h1 span {
      background: linear-gradient(135deg, #667eea, #764ba2);
      /* Standard property for compatibility */
      background-clip: text;
      /* WebKit-prefixed properties for broader support */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    
    .upload-area {
      border: 2px dashed #ddd;
      padding: 40px 20px;
      text-align: center;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      background: #fafafa;
      position: relative;
    }
    
    .upload-area:hover {
      border-color: #667eea;
      background: #f0f0ff;
      transform: translateY(-2px);
    }
    
    .upload-area.dragover {
      border-color: #4CAF50;
      background: #e8f5e9;
      transform: scale(1.02);
    }
    
    .upload-icon {
      font-size: 56px;
      margin-bottom: 10px;
      display: block;
    }
    
    .upload-area p {
      color: #666;
      font-size: 16px;
    }
    
    .upload-area .sub-text {
      font-size: 13px;
      color: #999;
      margin-top: 8px;
    }
    
    input[type="file"] {
      display: none;
    }
    
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      margin-top: 25px;
      width: 100%;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    #status {
      margin-top: 20px;
      padding: 15px 18px;
      border-radius: 12px;
      display: none;
      font-weight: 500;
    }
    
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .file-info {
      margin-top: 18px;
      padding: 18px;
      background: #f8f9fa;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      border-left: 4px solid #667eea;
    }
    
    .file-info strong {
      color: #333;
      display: block;
      margin-bottom: 8px;
    }
    
    .file-info .detail {
      padding: 3px 0;
      color: #555;
    }
    
    #progress {
      margin-top: 18px;
      background: #f0f0f0;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      height: 24px;
    }
    
    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
    }
    
    .url-link {
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
      font-weight: 500;
    }
    
    .url-link:hover {
      text-decoration: underline;
    }
    
    .success-icon {
      font-size: 20px;
      margin-right: 8px;
    }
    
    /* Responsivo */
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
      h1 {
        font-size: 22px;
      }
      .upload-area {
        padding: 30px 15px;
      }
      .upload-icon {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 <span>Upload de Ficheiros</span></h1>
    
    <div class="upload-area" id="uploadArea">
      <span class="upload-icon">📁</span>
      <p><strong>Clique ou arraste</strong> ficheiros aqui</p>
      <p class="sub-text">📷 Imagens · 📄 PDFs · 🎥 Vídeos (máx. 50MB)</p>
      <input type="file" id="fileInput">
    </div>
    
    <button id="uploadBtn" onclick="uploadFile()">🚀 Enviar Ficheiro</button>
    
    <div id="progress">
      <div id="progressBar">0%</div>
    </div>
    
    <div id="status"></div>
    <div id="fileInfo" class="file-info"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const uploadBtn = document.getElementById('uploadBtn');
    let selectedFile = null;

    // ========== CLICK NA ÁREA ==========
    uploadArea.addEventListener('click', () => fileInput.click());

    // ========== FICHEIRO SELECIONADO ==========
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        selectedFile = fileInput.files[0];
        showFileInfo(selectedFile);
        uploadBtn.disabled = false;
      }
    });

    // ========== DRAG & DROP ==========
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        selectedFile = e.dataTransfer.files[0];
        fileInput.files = e.dataTransfer.files;
        showFileInfo(selectedFile);
        uploadBtn.disabled = false;
      }
    });

    // ========== MOSTRAR INFORMAÇÃO DO FICHEIRO ==========
    function showFileInfo(file) {
      const infoDiv = document.getElementById('fileInfo');
      infoDiv.style.display = 'block';
      
      const sizeKB = (file.size / 1024).toFixed(2);
      const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
      const sizeDisplay = file.size > 1024 * 1024 ? `${sizeMB} MB` : `${sizeKB} KB`;
      
      const fileType = file.type || 'Desconhecido';
      const icon = file.type.startsWith('image/') ? '🖼️' : 
                   file.type === 'application/pdf' ? '📄' : 
                   file.type.startsWith('video/') ? '🎬' : '📎';
      
      infoDiv.innerHTML = `
        <strong>${icon} Ficheiro selecionado:</strong>
        <div class="detail">📌 Nome: <strong>${file.name}</strong></div>
        <div class="detail">📏 Tamanho: <strong>${sizeDisplay}</strong></div>
        <div class="detail">📁 Tipo: <strong>${fileType}</strong></div>
      `;
    }

    // ========== FUNÇÃO PRINCIPAL DE UPLOAD ==========
    async function uploadFile() {
      if (!selectedFile) {
        showStatus('⚠️ Por favor, selecione um ficheiro!', 'error');
        return;
      }

      const formData = new FormData();
      formData.append('file', selectedFile);

      const statusDiv = document.getElementById('status');
      const progressDiv = document.getElementById('progress');
      const progressBar = document.getElementById('progressBar');
      const infoDiv = document.getElementById('fileInfo');

      // Reset
      statusDiv.style.display = 'block';
      statusDiv.className = 'info';
      statusDiv.innerHTML = '⏳ A enviar ficheiro...';
      uploadBtn.disabled = true;
      
      progressDiv.style.display = 'block';
      progressBar.style.width = '0%';
      progressBar.textContent = '0%';

      try {
        // Usar XMLHttpRequest para progresso
        const xhr = new XMLHttpRequest();
        const uploadPromise = new Promise((resolve, reject) => {
          xhr.open('POST', '/api/upload');
          
          // Progresso do upload
          xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              progressBar.style.width = percent + '%';
              progressBar.textContent = percent + '%';
            }
          });

          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(JSON.parse(xhr.responseText));
            } else {
              try {
                const errorData = JSON.parse(xhr.responseText);
                reject(new Error(errorData.error || errorData.details || 'Erro no servidor'));
              } catch {
                reject(new Error('Erro ' + xhr.status + ': ' + xhr.statusText));
              }
            }
          };
          
          xhr.onerror = () => reject(new Error('Erro de rede. Verifique a ligação ao servidor.'));
          xhr.send(formData);
        });

        const data = await uploadPromise;
        
        // Sucesso
        progressBar.style.width = '100%';
        progressBar.textContent = '100%';
        
        showStatus('✅ Ficheiro enviado com sucesso! 🎉', 'success');
        
        infoDiv.style.display = 'block';
        infoDiv.innerHTML = `
          <strong>✅ Upload concluído!</strong>
          <div class="detail">📌 Nome original: <strong>${data.data.originalName}</strong></div>
          <div class="detail">📏 Tamanho: <strong>${(data.data.size / 1024).toFixed(2)} KB</strong></div>
          <div class="detail" style="margin-top:8px;">
            🔗 <a href="${data.data.url}" target="_blank" class="url-link">📎 Ver ficheiro</a>
          </div>
        `;

      } catch (error) {
        console.error('Erro detalhado:', error);
        showStatus('❌ Erro ao enviar: ' + error.message, 'error');
      } finally {
        uploadBtn.disabled = false;
        setTimeout(() => {
          progressDiv.style.display = 'none';
          progressBar.style.width = '0%';
        }, 3000);
      }
    }

    // ========== MOSTRAR STATUS ==========
    function showStatus(message, type) {
      const statusDiv = document.getElementById('status');
      statusDiv.style.display = 'block';
      statusDiv.className = type;
      statusDiv.innerHTML = message;
    }
  </script>
</body>
</html>
