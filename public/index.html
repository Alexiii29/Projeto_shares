<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>📤 Meus Documentos</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <style>
    /* ===== RESET E BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== CARDS ===== */
    .card {
      background: white;
      border-radius: 1.25rem;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      transition: box-shadow 0.3s ease;
    }

    @media (min-width: 768px) {
      .card {
        padding: 2rem;
      }
    }

    .hidden {
      display: none !important;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 600px) {
      .header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }
    }

    .header h1 {
      font-size: 1.4rem;
      color: #333;
      text-align: center;
    }

    @media (min-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
        text-align: left;
      }
    }

    .header h1 span {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .user-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    @media (min-width: 600px) {
      .user-info {
        justify-content: flex-end;
      }
    }

    .user-avatar {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: #667eea;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .user-email {
      font-size: 0.85rem;
      color: #555;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (min-width: 480px) {
      .user-email {
        max-width: 200px;
      }
    }

    /* ===== BOTÕES ===== */
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.625rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s ease;
      font-size: 0.9rem;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #e53e3e;
      color: white;
    }
    .btn-danger:hover {
      background: #c53030;
    }

    .btn-success {
      background: #48bb78;
      color: white;
    }
    .btn-success:hover {
      background: #38a169;
    }

    .btn-sm {
      padding: 0.3rem 0.75rem;
      font-size: 0.75rem;
    }

    .btn-danger-sm {
      background: #e53e3e;
      color: white;
      border: none;
      padding: 0.3rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-danger-sm:hover {
      background: #c53030;
    }

    /* ===== AUTH FORM ===== */
    .auth-form {
      max-width: 400px;
      margin: 0 auto;
      padding: 0 0.5rem;
    }

    .auth-form h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
      font-size: 1.6rem;
    }

    .auth-form input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid #ddd;
      border-radius: 0.625rem;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .auth-form .btn {
      width: 100%;
      padding: 0.8rem;
      font-size: 1.1rem;
      margin-top: 0.25rem;
    }

    .auth-toggle {
      color: #667eea;
      cursor: pointer;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    .auth-toggle:hover {
      text-decoration: underline;
    }

    .auth-error {
      color: #e53e3e;
      text-align: center;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      padding: 0.5rem;
      background: #fff5f5;
      border-radius: 0.5rem;
    }

    /* ===== UPLOAD AREA ===== */
    .upload-area {
      border: 2px dashed #ddd;
      padding: 2rem 1rem;
      text-align: center;
      border-radius: 0.9375rem;
      cursor: pointer;
      transition: all 0.3s;
      background: #fafafa;
    }

    @media (min-width: 480px) {
      .upload-area {
        padding: 2.5rem 1.5rem;
      }
    }

    .upload-area:hover {
      border-color: #667eea;
      background: #f0f0ff;
    }

    .upload-area.dragover {
      border-color: #48bb78;
      background: #e8f5e9;
    }

    .upload-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    @media (min-width: 480px) {
      .upload-icon {
        font-size: 3.5rem;
      }
    }

    .upload-area p {
      font-size: 1rem;
      color: #555;
    }

    .upload-area .sub-text {
      font-size: 0.8rem;
      color: #999;
      margin-top: 0.5rem;
    }

    input[type="file"] {
      display: none;
    }

    /* ===== PROGRESS ===== */
    #progress {
      margin-top: 1rem;
      background: #f0f0f0;
      border-radius: 0.625rem;
      overflow: hidden;
      display: none;
      height: 1.5rem;
    }

    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* ===== STATUS ===== */
    #status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 0.625rem;
      display: none;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    /* ===== FILE LIST ===== */
    .section-title {
      font-size: 1.2rem;
      color: #333;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }

    @media (min-width: 600px) {
      .section-title {
        font-size: 1.4rem;
        margin-top: 2rem;
      }
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 0.75rem;
    }

    @media (min-width: 480px) {
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1.25rem;
      }
    }

    @media (min-width: 768px) {
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.5rem;
      }
    }

    .file-item {
      background: #f8f9fa;
      padding: 0.75rem;
      border-radius: 0.75rem;
      border-left: 4px solid #667eea;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: all 0.2s;
    }

    .file-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .file-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f0f0f0;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 0.4rem;
      min-height: 80px;
    }

    @media (min-width: 480px) {
      .file-preview {
        min-height: 100px;
      }
    }

    @media (min-width: 768px) {
      .file-preview {
        min-height: 120px;
      }
    }

    .file-preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0.5rem;
    }

    .file-preview-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0.5rem;
    }

    .file-preview-icon {
      font-size: 2.5rem;
      color: #667eea;
    }

    @media (min-width: 480px) {
      .file-preview-icon {
        font-size: 3rem;
      }
    }

    .file-item .file-name {
      font-weight: 600;
      font-size: 0.8rem;
      word-break: break-all;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (min-width: 480px) {
      .file-item .file-name {
        font-size: 0.9rem;
      }
    }

    .file-item .file-size {
      font-size: 0.7rem;
      color: #666;
    }

    .file-item .file-date {
      font-size: 0.65rem;
      color: #999;
    }

    .file-item .file-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
    }

    .btn-download {
      background: #667eea;
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 0.375rem;
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 500;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }

    .btn-download:hover {
      background: #5a67d8;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: #999;
    }

    .empty-state .emoji {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    /* ===== BOTÃO DE UPLOAD PRINCIPAL ===== */
    #uploadBtn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.8rem;
      font-size: 1rem;
    }

    @media (min-width: 480px) {
      #uploadBtn {
        padding: 0.9rem;
        font-size: 1.1rem;
      }
    }

    /* ===== RESPONSIVE: AJUSTES FINOS ===== */
    @media (max-width: 400px) {
      body {
        padding: 0.5rem;
      }
      .card {
        padding: 1rem;
        border-radius: 1rem;
      }
      .header h1 {
        font-size: 1.2rem;
      }
      .user-email {
        font-size: 0.75rem;
        max-width: 120px;
      }
      .btn {
        font-size: 0.8rem;
        padding: 0.4rem 0.7rem;
      }
      .auth-form h2 {
        font-size: 1.3rem;
      }
      .upload-area {
        padding: 1.5rem 0.75rem;
      }
      .upload-icon {
        font-size: 2.5rem;
      }
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.75rem;
      }
    }

    /* ===== UTILITÁRIOS ===== */
    .text-center {
      text-align: center;
    }
    .mt-1 {
      margin-top: 0.75rem;
    }
    .w-full {
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- ============ AUTH CARD ============ -->
  <div id="authCard" class="card">
    <div class="auth-form">
      <h2 id="authTitle">🔐 Entrar</h2>
      <div id="authError" class="auth-error hidden"></div>
      <input type="email" id="authEmail" placeholder="Email" />
      <input type="password" id="authPassword" placeholder="Palavra-passe" />
      <button class="btn btn-primary" id="authBtn">Entrar</button>
      <div class="auth-toggle" id="authToggle">Não tem conta? <strong>Registar</strong></div>
    </div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <div id="dashboardCard" class="card hidden">

    <!-- Header -->
    <div class="header">
      <h1>📤 <span>Meus Documentos</span></h1>
      <div class="user-info">
        <span class="user-email" id="userEmail">user@email.com</span>
        <div class="user-avatar" id="userAvatar">U</div>
        <button class="btn btn-danger btn-sm" id="logoutBtn">Sair</button>
      </div>
    </div>

    <!-- Upload Area -->
    <div class="upload-area" id="uploadArea">
      <span class="upload-icon">📁</span>
      <p><strong>Clique ou arraste</strong> ficheiros aqui</p>
      <p class="sub-text">📷 Imagens · 📄 PDFs · 🎥 Vídeos (máx. 50MB)</p>
      <input type="file" id="fileInput" />
    </div>

    <button class="btn btn-success" id="uploadBtn" disabled>
      🚀 Enviar Ficheiro
    </button>

    <div id="progress"><div id="progressBar">0%</div></div>
    <div id="status"></div>

    <!-- File List -->
    <h3 class="section-title">📄 Os meus documentos</h3>
    <div id="fileList">
      <div class="empty-state">
        <span class="emoji">📭</span>
        <p>Nenhum documento enviado ainda.</p>
        <p style="font-size:0.85rem; color:#bbb;">Faça upload do seu primeiro ficheiro!</p>
      </div>
    </div>
  </div>

</div>

<!-- ============================================================ -->
<!-- ======================== JAVASCRIPT ========================= -->
<!-- ============================================================ -->
<script>
  // ================================================================
  // 0. URL DO BACKEND 
  // ================================================================
  const API_BASE = 'https://projeto-shares.onrender.com'; //

  // ================================================================
  // 1. CONFIGURAÇÃO DO FIREBASE
  // ================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyB17rpVmAOpk7ywyhzjDveuSazjOS4tmAs",
    authDomain: "projeto-shares.firebaseapp.com",
    projectId: "projeto-shares",
    storageBucket: "projeto-shares.firebasestorage.app",
    messagingSenderId: "441089104132",
    appId: "1:441089104132:web:7f3801b287b763904c1851"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ================================================================
  // 2. ELEMENTOS DOM
  // ================================================================
  const authCard = document.getElementById('authCard');
  const dashboardCard = document.getElementById('dashboardCard');
  const authTitle = document.getElementById('authTitle');
  const authEmail = document.getElementById('authEmail');
  const authPassword = document.getElementById('authPassword');
  const authBtn = document.getElementById('authBtn');
  const authToggle = document.getElementById('authToggle');
  const authError = document.getElementById('authError');
  const userEmail = document.getElementById('userEmail');
  const userAvatar = document.getElementById('userAvatar');
  const logoutBtn = document.getElementById('logoutBtn');

  const fileInput = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileList = document.getElementById('fileList');
  const statusDiv = document.getElementById('status');
  const progressDiv = document.getElementById('progress');
  const progressBar = document.getElementById('progressBar');

  let isLogin = true;
  let selectedFile = null;
  let currentUser = null;

  // ================================================================
  // 3. AUTH
  // ================================================================
  function showAuthError(msg) {
    authError.textContent = msg;
    authError.classList.remove('hidden');
  }
  function clearAuthError() {
    authError.classList.add('hidden');
  }

  function toggleAuthMode() {
    isLogin = !isLogin;
    authTitle.textContent = isLogin ? '🔐 Entrar' : '📝 Criar Conta';
    authBtn.textContent = isLogin ? 'Entrar' : 'Registar';
    authToggle.innerHTML = isLogin ?
      'Não tem conta? <strong>Registar</strong>' :
      'Já tem conta? <strong>Entrar</strong>';
    clearAuthError();
    authPassword.value = '';
  }
  authToggle.addEventListener('click', toggleAuthMode);

  async function handleAuth() {
    const email = authEmail.value.trim();
    const password = authPassword.value.trim();

    if (!email || !password) {
      showAuthError('Preencha todos os campos.');
      return;
    }
    clearAuthError();

    try {
      authBtn.disabled = true;
      authBtn.textContent = '⏳ A carregar...';

      if (isLogin) {
        await auth.signInWithEmailAndPassword(email, password);
      } else {
        await auth.createUserWithEmailAndPassword(email, password);
      }

      authBtn.textContent = isLogin ? 'Entrar' : 'Registar';
      authBtn.disabled = false;
    } catch (error) {
      authBtn.disabled = false;
      authBtn.textContent = isLogin ? 'Entrar' : 'Registar';
      showAuthError(error.message);
    }
  }
  authBtn.addEventListener('click', handleAuth);

  authEmail.addEventListener('keydown', (e) => { if (e.key === 'Enter') authPassword.focus(); });
  authPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });

  // ================================================================
  // 4. LOGOUT
  // ================================================================
  logoutBtn.addEventListener('click', async () => {
    await auth.signOut();
  });

  // ================================================================
  // 5. AUTH STATE
  // ================================================================
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      console.log('✅ Utilizador autenticado:', user.uid, user.email);
      authCard.classList.add('hidden');
      dashboardCard.classList.remove('hidden');
      userEmail.textContent = user.email;
      userAvatar.textContent = user.email.charAt(0).toUpperCase();
      uploadBtn.disabled = true;
      loadUserFiles();
    } else {
      currentUser = null;
      authCard.classList.remove('hidden');
      dashboardCard.classList.add('hidden');
      authEmail.value = '';
      authPassword.value = '';
      authEmail.focus();
    }
  });

  // ================================================================
  // 6. UPLOAD
  // ================================================================
  uploadArea.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
      selectedFile = fileInput.files[0];
      uploadBtn.disabled = false;
      showStatus(`📄 Selecionado: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(2)} KB)`, 'info');
    }
  });

  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      selectedFile = e.dataTransfer.files[0];
      fileInput.files = e.dataTransfer.files;
      uploadBtn.disabled = false;
      showStatus(`📄 Selecionado: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(2)} KB)`, 'info');
    }
  });

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) {
      showStatus('⚠️ Selecione um ficheiro!', 'error');
      return;
    }
    if (!currentUser) {
      showStatus('⚠️ Faça login primeiro!', 'error');
      return;
    }

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('uid', currentUser.uid);

    uploadBtn.disabled = true;
    progressDiv.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.textContent = '0%';
    showStatus('⏳ A enviar...', 'info');

    try {
      const xhr = new XMLHttpRequest();
      const result = await new Promise((resolve, reject) => {
        xhr.open('POST', `${API_BASE}/api/upload`);
        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = pct + '%';
            progressBar.textContent = pct + '%';
          }
        });
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            try { resolve(JSON.parse(xhr.responseText)); } catch { reject(new Error('Resposta inválida')); }
          } else {
            try { const d = JSON.parse(xhr.responseText); reject(new Error(d.error || d.details || 'Erro no servidor')); } catch { reject(new Error('Erro ' + xhr.status)); }
          }
        };
        xhr.onerror = () => reject(new Error('Erro de rede'));
        xhr.send(formData);
      });

      progressBar.style.width = '100%';
      progressBar.textContent = '100%';
      showStatus('✅ Ficheiro enviado com sucesso! 🎉', 'success');
      selectedFile = null;
      fileInput.value = '';
      uploadBtn.disabled = true;
      loadUserFiles();

    } catch (error) {
      showStatus('❌ ' + error.message, 'error');
    } finally {
      uploadBtn.disabled = false;
      setTimeout(() => {
        progressDiv.style.display = 'none';
        progressBar.style.width = '0%';
      }, 3000);
    }
  });

  // ================================================================
  // 7. CARREGAR FICHEIROS
  // ================================================================
  async function loadUserFiles() {
    if (!currentUser) return;

    try {
      const response = await fetch(`${API_BASE}/api/files?uid=${currentUser.uid}`);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Erro ao carregar ficheiros');
      renderFileList(data.files || []);
    } catch (error) {
      console.error('❌ Erro ao carregar ficheiros:', error);
      fileList.innerHTML = `
        <div class="empty-state">
          <span class="emoji">⚠️</span>
          <p>Erro ao carregar ficheiros: ${error.message}</p>
        </div>
      `;
    }
  }

  // ================================================================
  // 8. RENDERIZAR LISTA
  // ================================================================
  function renderFileList(files) {
    if (!files || files.length === 0) {
      fileList.innerHTML = `
        <div class="empty-state">
          <span class="emoji">📭</span>
          <p>Nenhum documento enviado ainda.</p>
          <p style="font-size:0.85rem; color:#bbb;">Faça upload do seu primeiro ficheiro!</p>
        </div>
      `;
      return;
    }

    let html = '<div class="file-grid">';
    files.forEach((file) => {
      const sizeKB = (file.size / 1024).toFixed(2);
      const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
      const sizeDisplay = file.size > 1024 * 1024 ? `${sizeMB} MB` : `${sizeKB} KB`;
      const date = new Date(file.uploadedAt).toLocaleDateString('pt-PT');

      const ext = file.originalName.split('.').pop().toLowerCase();
      const isImage = ['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext);
      const isVideo = ['mp4','webm','ogg','avi','mov'].includes(ext);
      const isPDF = ext === 'pdf';
      const isAudio = ['mp3','wav','ogg','aac'].includes(ext);

      let previewHtml = '';
      if (isImage) {
        previewHtml = `<img src="${file.url}" alt="${file.originalName}" class="file-preview-image" loading="lazy" />`;
      } else if (isVideo) {
        previewHtml = `<video src="${file.url}" class="file-preview-video" muted></video>`;
      } else if (isPDF) {
        previewHtml = `<div class="file-preview-icon">📄</div>`;
      } else if (isAudio) {
        previewHtml = `<div class="file-preview-icon">🎵</div>`;
      } else {
        previewHtml = `<div class="file-preview-icon">📎</div>`;
      }

      html += `
        <div class="file-item">
          <div class="file-preview">${previewHtml}</div>
          <div class="file-name" title="${file.originalName}">${file.originalName}</div>
          <div class="file-size">📏 ${sizeDisplay}</div>
          <div class="file-date">📅 ${date}</div>
          <div class="file-actions">
            <a href="${file.url}" download class="btn-download">📥 Download</a>
            <button class="btn-danger-sm" onclick="deleteFile('${file.fileName}')">🗑️</button>
          </div>
        </div>
      `;
    });
    html += '</div>';
    fileList.innerHTML = html;
  }

  // ================================================================
  // 9. ELIMINAR
  // ================================================================
  async function deleteFile(fileName) {
    if (!confirm('Tem a certeza que pretende eliminar este ficheiro?')) return;
    if (!currentUser) return;

    try {
      const response = await fetch(`${API_BASE}/api/delete`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileName, uid: currentUser.uid })
      });
      const data = await response.json();
      if (response.ok) {
        showStatus('✅ Ficheiro eliminado!', 'success');
        loadUserFiles();
      } else {
        showStatus('❌ ' + (data.error || 'Erro ao eliminar'), 'error');
      }
    } catch (error) {
      showStatus('❌ ' + error.message, 'error');
    }
  }

  // ================================================================
  // 10. STATUS
  // ================================================================
  function showStatus(message, type) {
    statusDiv.style.display = 'block';
    statusDiv.className = type;
    statusDiv.textContent = message;
  }
</script>

</body>
</html>
